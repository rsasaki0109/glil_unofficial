<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GLIL CPU Reproduction Fork scorecard</title>
  <desc id="desc">MegaParticles APE has three passing datasets and the Ouster smoke sample completes cleanly.</desc>
  <rect width="1200" height="630" fill="#f6f8fb"/>
  <rect x="36" y="34" width="1128" height="562" rx="18" fill="#ffffff" stroke="#d8dee8"/>
  <text x="80" y="104" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#152238">GLIL CPU Reproduction Fork</text>
  <text x="82" y="148" font-family="Arial, sans-serif" font-size="22" fill="#536173">Reproducible LiDAR odometry configs for MegaParticles and Ouster sample checks</text>
  <g transform="translate(80 190)">
    <rect width="1040" height="70" rx="10" fill="#14213d"/>
    <text x="30" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">3/3 MegaParticles APE PASS</text>
    <text x="548" y="44" font-family="Arial, sans-serif" font-size="24" fill="#d7f5e7">outdoor_hard_01a: 5/5 byte-identical</text>
  </g>
  <g transform="translate(80 300)">
    <rect width="240" height="170" rx="10" fill="#e8f3ff" stroke="#83b6e8"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0b3d66">indoor_easy_01</text>
    <text x="24" y="88" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0b3d66">1.019 m</text>
    <text x="24" y="124" font-family="Arial, sans-serif" font-size="18" fill="#43627c">GLIM baseline 3.383 m</text>
    <text x="24" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#18794e">Track B+C PASS</text>
  </g>
  <g transform="translate(350 300)">
    <rect width="240" height="170" rx="10" fill="#eaf8ef" stroke="#88cfa6"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#145c36">outdoor_hard_01a</text>
    <text x="24" y="88" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#145c36">0.906 m</text>
    <text x="24" y="124" font-family="Arial, sans-serif" font-size="18" fill="#436d55">5/5 byte-identical</text>
    <text x="24" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#18794e">Track B+C PASS</text>
  </g>
  <g transform="translate(620 300)">
    <rect width="240" height="170" rx="10" fill="#fff4df" stroke="#e3b35c"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#714a00">outdoor_kidnap_a</text>
    <text x="24" y="88" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#714a00">20.350 m</text>
    <text x="24" y="124" font-family="Arial, sans-serif" font-size="18" fill="#735d32">GLIM baseline 21.701 m</text>
    <text x="24" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#18794e">Track B+C PASS</text>
  </g>
  <g transform="translate(890 300)">
    <rect width="230" height="170" rx="10" fill="#f0edf8" stroke="#b9a7df"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#4b367c">Ouster smoke</text>
    <text x="24" y="88" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#4b367c">1122 poses</text>
    <text x="24" y="124" font-family="Arial, sans-serif" font-size="18" fill="#65577d">fallback 0, abort 0</text>
    <text x="24" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#8a5b00">WARN: no GT APE</text>
  </g>
  <text x="82" y="535" font-family="Arial, sans-serif" font-size="21" fill="#334155">Docs, configs, CI, and issue templates: github.com/rsasaki0109/glil_unofficial</text>
