name: CI

on:
  push:
    branches-ignore:
      - gh-pages
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - dev
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker build (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04-gcc
            ubuntu: noble
            suffix: gcc
          - name: ubuntu-24.04-llvm
            ubuntu: noble
            suffix: llvm
          - name: ubuntu-22.04-gcc
            ubuntu: jammy
            suffix: gcc
          - name: ubuntu-22.04-llvm
            ubuntu: jammy
            suffix: llvm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile.${{ matrix.suffix }}
          build-args: |
            BASE_IMAGE=koide3/gtsam_points:${{ matrix.ubuntu }}
          tags: glil-unofficial-ci:${{ matrix.name }}
          pull: true
          push: false
          cache-from: type=gha,scope=core-${{ matrix.name }}
          cache-to: type=gha,scope=core-${{ matrix.name }},mode=max

  docker-build-cuda:
    name: Docker build (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-cuda-gcc
            ubuntu: jammy_cuda12.2
            suffix: gcc.cuda
          - name: ubuntu-22.04-cuda-llvm
            ubuntu: jammy_cuda12.2
            suffix: llvm.cuda

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile.${{ matrix.suffix }}
          build-args: |
            BASE_IMAGE=koide3/gtsam_points:${{ matrix.ubuntu }}
          tags: glil-unofficial-ci:${{ matrix.name }}
          pull: true
          push: false
          cache-from: type=gha,scope=cuda-${{ matrix.name }}
          cache-to: type=gha,scope=cuda-${{ matrix.name }},mode=max
