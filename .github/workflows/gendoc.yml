name: Docs

on:
  pull_request:
    branches:
      - dev
      - master
    paths:
      - ".github/workflows/gendoc.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "docs/**"
      - "include/**"
      - "mkdocs.yml"
      - "src/**"
  push:
    branches:
      - dev
      - master
    paths:
      - ".github/workflows/gendoc.yml"
      - "CMakeLists.txt"
      - "README.md"
      - "docs/**"
      - "include/**"
      - "mkdocs.yml"
      - "src/**"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential doxygen graphviz python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Generate documentation
        run: cd docs && make all

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  deploy-docs:
    name: Deploy documentation
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master')
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
